<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Htstr</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <h1>Htstr</h1>
            <p>Enhanced playback for Hitster cards</p>
            <button id="login-btn" class="btn-primary"><svg viewBox="0 0 24 24" class="icon"><circle cx="12" cy="12" r="10" fill="#1DB954"/><path d="M16.5 12.5c-2.5-1.5-6-1.5-8 0" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M15 14.5c-2-1-4.5-1-6 0" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M13.5 16.5c-1-.5-2-.5-3 0" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg> Login with Spotify</button>
            <p class="hint">Requires Spotify Premium</p>
        </div>

        <!-- Main Screen -->
        <div id="main-screen" class="screen hidden">
            <header>
                <h1>Htstr</h1>
                <button id="back-to-settings-btn" class="btn-icon"><svg viewBox="0 0 24 24" class="icon"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="currentColor"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
            </header>

            <div id="scanner-container">
                <video id="scanner-video" playsinline></video>
                <div id="scanner-overlay"></div>
            </div>

            <div id="player-container" class="hidden">
                <div id="now-playing">
                    <div id="track-info">Scan a card to play</div>
                    <div id="timer-circle">
                        <svg viewBox="0 0 100 100">
                            <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div id="time-display">0:00</div>
                    </div>
                </div>
                <div id="controls">
                    <button id="play-pause-btn" class="btn-control"><svg viewBox="0 0 24 24" class="icon"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg> Play</button>
                    <button id="rewind-btn" class="btn-control"><svg viewBox="0 0 24 24" class="icon"><path d="M1 4v6h6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Rewind</button>
                    <button id="rescan-btn" class="btn-control"><svg viewBox="0 0 24 24" class="icon"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/></svg> Scan</button>
                </div>
                <div id="card-container">
                    <div id="edition-display" class="hidden"></div>
                    <div id="card" class="card-back">
                        <div class="card-face card-front">
                            <div class="card-artist"></div>
                            <div class="card-year"></div>
                            <div class="card-title"></div>
                        </div>
                        <div class="card-face card-back-face">
                            <div class="card-logo">?</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="status-message"></div>
        </div>

        <!-- Settings Screen (shown after login, before scanning) -->
        <div id="settings-screen" class="screen hidden">
            <h1>Htstr</h1>
            <div class="settings-card">
                <h2>Game Settings</h2>
                <div class="setting">
                    <label for="duration-select">Playback Duration</label>
                    <select id="duration-select">
                        <option value="15">15 seconds</option>
                        <option value="30" selected>30 seconds</option>
                        <option value="45">45 seconds</option>
                        <option value="60">60 seconds</option>
                        <option value="0">Full song</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="position-select">Start Position</label>
                    <select id="position-select">
                        <option value="start">From song start</option>
                        <option value="random">Completely random</option>
                        <option value="first-half">Random (1st half)</option>
                        <option value="second-half">Random (2nd half)</option>
                    </select>
                </div>
                <div class="setting checkbox-setting">
                    <label>
                        <input type="checkbox" id="show-edition">
                        Show Edition
                    </label>
                </div>
                <button id="start-game-btn" class="btn-primary"><svg viewBox="0 0 24 24" class="icon"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/></svg> Start Scanning</button>
                <button id="logout-btn" class="btn-secondary"><svg viewBox="0 0 24 24" class="icon"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Logout</button>
                <div id="version-display"></div>
                <div id="update-banner" class="hidden">
                    New version available! <button id="update-btn"><svg viewBox="0 0 24 24" class="icon"><path d="M1 4v6h6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M23 20v-6h-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Refresh</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
